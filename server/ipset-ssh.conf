# fail2ban action: ipset-ssh
# Stores banned IPs in a named ipset and wires it into iptables INPUT.
# Entries auto-expire after <bantime> seconds using ipset's native timeout.
#
# Usage in jail.local:
#   action = ipset-ssh[name=SSH, port=ssh, protocol=tcp, bantime=120]

[INCLUDES]

[Definition]

# On jail start: create the ipset (with timeout support) and insert iptables rule.
actionstart = ipset create <ipmset> hash:ip maxelem 65536 timeout 0 -exist
              iptables -I INPUT 1 -p <protocol> --dport <port> \
                  -m set --match-set <ipmset> src -j DROP \
                  -m comment --comment "f2b-<name>"

# On jail stop: remove iptables rule, flush, and destroy the ipset.
actionstop  = iptables -D INPUT -p <protocol> --dport <port> \
                  -m set --match-set <ipmset> src -j DROP \
                  -m comment --comment "f2b-<name>" 2>/dev/null || true
              ipset flush <ipmset>  2>/dev/null || true
              ipset destroy <ipmset> 2>/dev/null || true

# On ban: add IP to ipset with per-entry timeout so it auto-expires.
actionban   = ipset add <ipmset> <ip> timeout <bantime> -exist

# On unban: remove the IP (in case ban time was extended manually).
actionunban = ipset del <ipmset> <ip> -exist 2>/dev/null || true

[Init]
name     = default
port     = ssh
protocol = tcp
# Name of the ipset created/managed by this action
ipmset   = ssh-blocklist
