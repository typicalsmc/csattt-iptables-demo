version: '3.8'

networks:
  demo_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/24

services:
  server:
    build:
      context: ./server
    container_name: iptables_server
    hostname: server
    networks:
      demo_net:
        ipv4_address: 172.25.0.10
    privileged: true          # Required for iptables manipulation
    environment:
      - SERVER_IP=172.25.0.10
      - CLIENT_IP=172.25.0.20
    ports:
      - "8080:80"             # Expose server HTTP to host for manual testing
    tty: true
    stdin_open: true

  client:
    build:
      context: ./client
    container_name: iptables_client
    hostname: client
    networks:
      demo_net:
        ipv4_address: 172.25.0.20
    privileged: true          # Required for raw sockets (Scapy) and iptables (IP block demo)
    depends_on:
      - server
    environment:
      - SERVER_IP=172.25.0.10
      - CLIENT_IP=172.25.0.20
      - SERVER_PORT=80
    tty: true
    stdin_open: true
